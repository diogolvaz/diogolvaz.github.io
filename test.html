<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Slider</title>
<style>
  .slider-container {
    overflow: hidden;
    width: 300px; /* Adjust this according to your design */
    height: 200px; /* Adjust this according to your design */
    position: relative;
  }
  .slider-content {
    display: flex;
    transition: transform 0.5s ease;
  }
  .slider-image {
    width: 100%;
    height: auto;
  }
</style>
</head>
<body>

<div class="slider-container">
  <div class="slider-content">
    <img class="slider-image" src="images/DE4A_logo.jpeg" alt="Image 1">
    <img class="slider-image" src="images/Diogo_Vaz.jpg" alt="Image 2">
    <img class="slider-image" src="image3.jpg" alt="Image 3">
    <!-- Add more images as needed -->
  </div>
</div>

<script>
  // JavaScript to slide images
  const slider = document.querySelector('.slider-content');
  let slideIndex = 0;
  const slideWidth = slider.clientWidth;

  function slideImages() {
    slideIndex++;
    if (slideIndex * slideWidth >= slider.scrollWidth) {
      slideIndex = 0;
    }
    slider.style.transform = `translateX(-${slideIndex * slideWidth}px)`;
  }

  setInterval(slideImages, 2000); // Change image every 2 seconds (adjust as needed)
</script>

</body>
</html>
